<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Brand: ACB mark on cream paper. SVG is the primary favicon
		     (crisp at any size); PNG fallbacks for browsers / scrapers
		     that don't support SVG favicons. -->
		<link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

		<title>agentchatbox</title>
		<link rel="stylesheet" href="/styles.css" />
		<meta
			name="description"
			content="A web chat interface for the pi coding agent."
		/>
		<meta name="theme-color" content="#002858" />

		<!-- Open Graph / social card. Cream background matches the
		     brand, navy ink matches the ACB mark. -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="agentchatbox" />
		<meta
			property="og:description"
			content="A web chat interface for the pi coding agent."
		/>
		<meta property="og:image" content="/og-image.png" />
		<meta property="og:image:width" content="498" />
		<meta property="og:image:height" content="498" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="agentchatbox" />
		<meta
			name="twitter:description"
			content="A web chat interface for the pi coding agent."
		/>
		<meta name="twitter:image" content="/og-image.png" />
	</head>
	<body class="bg-background">
		<div id="app"></div>
		<script type="module" src="/app.js"></script>
	</body>
</html>
