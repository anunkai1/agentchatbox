name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        # Runs both server and client configs. `npm run typecheck` chains
        # the two tsc invocations; client side was previously excluded
        # (two pre-existing implicit-any errors in main.ts) but those
        # were fixed when main.ts was split into the dom/render/slashes/
        # voice/state modules.
        run: npm run typecheck

      - name: Test
        run: npm test -- --reporter=verbose 2>&1

      - name: Build
        run: npm run build
